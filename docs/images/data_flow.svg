<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Trade reconciliation data flow</title>
  <desc>Data flow showing simulator error injection, dbt priority classification, SLA targets, and Slack alerting</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Simulator ── -->
  <rect x="215" y="20" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="36" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#085041">Simulator</text>
  <text x="340" y="54" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#0F6E56">1,000 trades/run · 5% error rate</text>

  <line x1="340" y1="64" x2="340" y2="92" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Error injection ── -->
  <rect x="40" y="96" width="600" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="340" y="116" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#2C2C2A">Error injection</text>

  <!-- Error pills -->
  <rect x="56" y="126" width="108" height="22" rx="11" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="110" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#791F1F">price_mismatch</text>

  <rect x="176" y="126" width="100" height="22" rx="11" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="226" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#791F1F">qty_mismatch</text>

  <rect x="288" y="126" width="124" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="350" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#633806">missing_exchange</text>

  <rect x="424" y="126" width="112" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="480" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#633806">missing_broker</text>

  <rect x="548" y="126" width="76" height="22" rx="11" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="586" y="141" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#444441">duplicate</text>

  <line x1="340" y1="176" x2="340" y2="204" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── dbt classify_priority ── -->
  <rect x="130" y="208" width="420" height="68" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="228" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#042C53">dbt · classify_priority macro</text>
  <text x="220" y="252" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#185FA5">price_diff &gt; 1.00</text>
  <text x="340" y="252" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#185FA5">price_diff &gt; 0.10</text>
  <text x="460" y="252" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#185FA5">otherwise</text>
  <line x1="180" y1="258" x2="180" y2="270" stroke="#6B7280" stroke-width="1"/>
  <line x1="340" y1="258" x2="340" y2="270" stroke="#6B7280" stroke-width="1"/>
  <line x1="500" y1="258" x2="500" y2="270" stroke="#6B7280" stroke-width="1"/>

  <!-- Arrows to priority boxes -->
  <path d="M180 276 L180 312" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M340 276 L340 312" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M500 276 L500 312" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Priority boxes ── -->
  <!-- HIGH -->
  <rect x="40" y="316" width="275" height="72" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="178" y="338" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="14" font-weight="600" fill="#501313">HIGH</text>
  <text x="178" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#A32D2D">SLA: resolve &lt; 4 hours</text>
  <text x="178" y="376" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#791F1F">missing trades · large diff</text>

  <!-- MEDIUM -->
  <rect x="202" y="316" width="275" height="72" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="338" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="14" font-weight="600" fill="#412402">MEDIUM</text>
  <text x="340" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#854F0B">SLA: resolve &lt; 24 hours</text>
  <text x="340" y="376" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#633806">price diff 0.10 – 1.00</text>

  <!-- LOW -->
  <rect x="364" y="316" width="275" height="72" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="502" y="338" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="14" font-weight="600" fill="#173404">LOW</text>
  <text x="502" y="358" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#3B6D11">SLA: resolve &lt; 72 hours</text>
  <text x="502" y="376" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#27500A">small rounding diff</text>

  <!-- Arrow from HIGH to Slack -->
  <line x1="178" y1="388" x2="178" y2="418" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M178 418 L340 418 L340 438" fill="none" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Slack alert ── -->
  <rect x="190" y="442" width="300" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="460" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#412402">Slack alert</text>
  <text x="340" y="478" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#854F0B">fires when HIGH breaks &gt; 10</text>
</svg>
