[tool.ruff]
target-version = "py311"
line-length = 100

select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
]

ignore = [
    "E501",  # line too long — handled by formatter
]

exclude = [
    ".venv",
    "__pycache__",
    "dbt/target",
    "dbt/dbt_packages",
]

[tool.ruff.isort]
known-first-party = ["simulator", "dashboard"]