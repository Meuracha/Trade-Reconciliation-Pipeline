version: 2

sources:
  - name: raw
    schema: public
    description: "Raw data loaded by the simulator and Operations team"
    tables:
      - name: raw_broker_trades
        description: "Raw trades recorded on broker side (Yuanta)"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: ingested_at

      - name: raw_exchange_trades
        description: "Raw trades recorded on exchange side (SET)"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: ingested_at

      - name: break_resolutions
        description: "Break resolution tracking — updated by Operations team"
        columns:
          - name: break_id
            description: "Auto-increment primary key"
          - name: trade_id
            description: "Unique trade identifier"
          - name: break_type
            description: "Type of reconciliation break"
          - name: priority
            description: "HIGH / MEDIUM / LOW"
          - name: status
            description: "OPEN / IN_PROGRESS / RESOLVED"
          - name: detected_at
            description: "Timestamp when break was detected"
          - name: resolved_at
            description: "Timestamp when break was resolved"