trade_recon:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('APP_DB_HOST', 'localhost') }}"
      port: "{{ env_var('APP_DB_PORT', '5432') | int }}"
      dbname: "{{ env_var('APP_DB_NAME', 'recon') }}"
      user: "{{ env_var('APP_DB_USER', 'recon') }}"
      password: "{{ env_var('APP_DB_PASSWORD', '') }}"
      schema: public
      threads: 4
